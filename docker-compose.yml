version: '3.9'

services:
  entifier:
    build: ./services/entifier
    ports:
      - "37491:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://entifier:entifier@postgres:5432/entifier
      QDRANT_URL: http://qdrant:6333
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: entifier
      MINIO_SECRET_KEY: entifier123
      MINIO_BUCKET: entifier-files

  postgres:
    image: postgres:16-alpine
    ports:
      - "25432:5432"
    environment:
      POSTGRES_DB: entifier
      POSTGRES_USER: entifier
      POSTGRES_PASSWORD: entifier
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entifier"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "26333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  minio:
    image: minio/minio:latest
    ports:
      - "39000:9000"
      - "39001:9001"
    environment:
      MINIO_ROOT_USER: entifier
      MINIO_ROOT_PASSWORD: entifier123
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  webui:
    build: services/webui
    image: hermes-docwriter-webui:latest
    ports:
      - "32180:3000"
    environment:
      ENTIFIER_URL: http://entifier:8000
    depends_on:
      - entifier
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
  miniodata:
